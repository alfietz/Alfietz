    <button onclick="fetchInitialData()">Trigger get_initial_data</button>

    <pre id="output">Waiting for signal...</pre>

    <script>
        async function fetchInitialData() {
            const output = document.getElementById('output');
            output.innerText = "Fetching...";

            try {
                // Change this to http://localhost:3000/api/db if running on a different port
                const response = await fetch('http:/localhost:3000/api/db', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Heritage-Platform': 'web',
                        'X-Heritage-App-Key': 'heritage_web_public_v1' // Bypasses your security check
                    },
                    body: JSON.stringify({
                        action: "get_initial_data",
                        params: { userId: "guest" }
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
